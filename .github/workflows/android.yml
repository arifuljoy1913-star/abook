name: Asmani Mesh Engine Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Code
      uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Force Build APK
      run: |
        mkdir -p app/src/main/java/com/smartvillage/asmanimesh/ultimate
        echo "rootProject.name = 'abook'" > settings.gradle
        echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.smartvillage.asmanimesh.ultimate'
            compileSdk 34
            defaultConfig {
                applicationId "com.smartvillage.asmanimesh.ultimate"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.gms:play-services-ads:23.0.0'
        }
        EOF
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://android.com">
            <application android:theme="@style/Theme.AppCompat.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        cat << 'EOF' > app/src/main/java/com/smartvillage/asmanimesh/ultimate/MainActivity.java
        package com.smartvillage.asmanimesh.ultimate;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
            }
        }
        EOF
        gradle assembleDebug --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AsmaniMesh-Testing-APK
        path: app/build/outputs/apk/debug/app-debug.apk
