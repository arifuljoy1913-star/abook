name: Android CI/CD Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Sourcing
      uses: actions/checkout@v4

    - name: Set up JDK 17 Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Android App Testing APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK Deliverable
      uses: actions/upload-artifact@v4
      with:
        name: AsmaniMesh-Testing-APK
        path: app/build/outputs/apk/debug/app-debug.apk
