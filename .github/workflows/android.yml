name: Asmani Mesh Engine Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone Code
      uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Force Build APK
      run: |
        # Force link root to app module to fix Task not found error
        echo "include ':app'" > settings.gradle
        echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
        
        # Inject standard gradle wrapper files automatically
        mkdir -p gradle/wrapper
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        cat << 'EOF' > gradlew
        #!/usr/bin/env sh
        exec gradle "$@"
        EOF
        chmod +x gradlew
        
        ./gradlew :app:assembleDebug --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AsmaniMesh-Testing-APK
        path: app/build/outputs/apk/debug/app-debug.apk
